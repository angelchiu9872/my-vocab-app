<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的雲端單字庫</title>
    
    <!-- 引入 Tailwind CSS 進行排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 核心 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 引入 Babel 讓瀏覽器能看懂 React 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .modal-open { overflow: hidden; }
        /* 平滑展開動畫 */
        .expand-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.2s;
            opacity: 0;
        }
        .expanded .expand-content {
            max-height: 200px;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Firebase 設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyB5DBCI5GVeE6AR-krsXly8CsGpEq0Zucw",
            authDomain: "my-vocab-app-6935a.firebaseapp.com",
            projectId: "my-vocab-app-6935a",
            storageBucket: "my-vocab-app-6935a.firebasestorage.app",
            messagingSenderId: "200389430232",
            appId: "1:200389430232:web:d54657804db03fa7ca80ad"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appRoomId = "my-vocab-app-6935a";

        // --- 內建圖示 ---
        const Icons = {
            Plus: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Volume2: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>,
            BrainCircuit: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08 2.5 2.5 0 0 0 4.91.05L12 20V4.5Z"/><path d="M16 8V5c0-1.1.9-2 2-2"/><path d="M12 13h4"/><path d="M12 18h6a2 2 0 0 1 2 2v1"/><path d="M19 6.2v.6a2 2 0 0 1-2 2h-1"/><path d="M22 13h-4"/></svg>,
            X: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
            Trash2: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            CheckCircle2: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>,
            BookOpen: ({size=24}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            Loader2: ({size=24}) => <svg className="animate-spin" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>,
            Eye: ({size=14}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        };

        function App() {
            const [user, setUser] = useState(null);
            const [words, setWords] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isQuizOpen, setIsQuizOpen] = useState(false);
            const [expandedIds, setExpandedIds] = useState(new Set());
            
            const [formData, setFormData] = useState({ word: '', meaning: '', note: '' });
            
            const [quizData, setQuizData] = useState({
                question: null,
                options: [],
                selectedId: null,
                isCorrect: null,
                score: 0
            });

            const roomRef = db.collection('artifacts').doc(appRoomId).collection('public').doc('data').collection('my-room');

            useEffect(() => {
                auth.signInAnonymously();
                const unsubscribeAuth = auth.onAuthStateChanged((u) => setUser(u));
                const unsubscribeData = roomRef.orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setWords(data);
                    setIsLoading(false);
                });
                return () => {
                    unsubscribeAuth();
                    unsubscribeData();
                };
            }, []);

            const toggleExpand = (id) => {
                const newSet = new Set(expandedIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setExpandedIds(newSet);
            };

            const speak = (e, text) => {
                if (e) e.stopPropagation();
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = 'en-US';
                ut.rate = 0.9;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(ut);
            };

            const startNewQuiz = () => {
                if (words.length < 4) {
                    alert("至少需要 4 個單字才能開始測驗喔！");
                    return;
                }
                const correctWord = words[Math.floor(Math.random() * words.length)];
                const others = words.filter(w => w.id !== correctWord.id).sort(() => 0.5 - Math.random()).slice(0, 3);
                const options = [correctWord, ...others].sort(() => 0.5 - Math.random());
                setQuizData({ ...quizData, question: correctWord, options: options, selectedId: null, isCorrect: null });
                setIsQuizOpen(true);
            };

            const handleAnswer = (selected) => {
                if (quizData.selectedId) return; 
                const correct = selected.id === quizData.question.id;
                setQuizData({ ...quizData, selectedId: selected.id, isCorrect: correct, score: correct ? quizData.score + 1 : quizData.score });
                if (correct) speak(null, quizData.question.word);
                setTimeout(() => { startNewQuiz(); }, 1500);
            };

            const handleSave = async (e) => {
                e.preventDefault();
                if (!formData.word || !formData.meaning) return;
                const docId = Date.now().toString();
                await roomRef.doc(docId).set({ ...formData, createdAt: Date.now() });
                setFormData({ word: '', meaning: '', note: '' });
                setIsModalOpen(false);
            };

            const handleDelete = async (e, id) => {
                e.stopPropagation();
                if(confirm("確定要刪除這個單字嗎？")){
                    await roomRef.doc(id).delete();
                }
            };

            return (
                <div>
                    <nav className="bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-2">
                            <div className="text-indigo-600"><Icons.BookOpen size={24} /></div>
                            <h1 className="text-xl font-bold tracking-tight">我的雲端單字庫</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={startNewQuiz} className="p-2 bg-indigo-50 text-indigo-600 rounded-xl hover:bg-indigo-100 transition-all">
                                <Icons.BrainCircuit size={22} />
                            </button>
                            <button onClick={() => setIsModalOpen(true)} className="p-2 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition-all">
                                <Icons.Plus size={22} />
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-md mx-auto p-6 space-y-4">
                        {isLoading ? (
                            <div className="flex flex-col items-center justify-center py-20 text-slate-400">
                                <Icons.Loader2 size={24} />
                                <p className="mt-2 text-sm italic">同步雲端資料中...</p>
                            </div>
                        ) : words.length === 0 ? (
                            <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200 text-slate-400">
                                目前還沒有單字，點擊右上角 + 開始。
                            </div>
                        ) : (
                            words.map(w => {
                                const isExpanded = expandedIds.has(w.id);
                                return (
                                    <div 
                                        key={w.id} 
                                        onClick={() => toggleExpand(w.id)}
                                        className={`bg-white p-5 rounded-2xl shadow-sm border transition-all cursor-pointer select-none
                                            ${isExpanded ? 'border-indigo-200 ring-2 ring-indigo-50' : 'border-slate-100 hover:border-slate-300'}
                                            ${isExpanded ? 'expanded' : ''}
                                        `}
                                    >
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-2">
                                                    <h3 className="text-2xl font-bold text-slate-800 tracking-tight">{w.word}</h3>
                                                    <button onClick={(e) => speak(e, w.word)} className="text-indigo-400 p-1.5 hover:bg-indigo-50 rounded-lg transition-colors">
                                                        <Icons.Volume2 size={20} />
                                                    </button>
                                                </div>
                                                
                                                {!isExpanded && (
                                                    <div className="mt-2 inline-flex items-center gap-1.5 text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-md uppercase tracking-wider">
                                                        <Icons.Eye size={12} /> 點擊查看中文
                                                    </div>
                                                )}
                                                
                                                <div className="expand-content">
                                                    <p className="text-indigo-600 font-bold text-lg mt-3 pt-3 border-t border-slate-50">{w.meaning}</p>
                                                    {w.note && (
                                                        <div className="mt-3 bg-slate-50 p-3 rounded-xl">
                                                            <p className="text-xs font-bold text-slate-400 mb-1 uppercase tracking-tighter">Note / Example</p>
                                                            <p className="text-sm text-slate-600 italic leading-relaxed">{w.note}</p>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                            <button onClick={(e) => handleDelete(e, w.id)} className="text-slate-200 hover:text-red-400 p-2 transition-colors ml-2">
                                                <Icons.Trash2 size={18} />
                                            </button>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </main>

                    {/* 測驗彈窗 */}
                    {isQuizOpen && quizData.question && (
                        <div className="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6">
                            <div className="bg-white w-full max-w-sm rounded-[2.5rem] shadow-2xl overflow-hidden">
                                <div className="p-8 text-center">
                                    <div className="flex justify-between items-center mb-6">
                                        <span className="text-xs font-bold text-indigo-500 bg-indigo-50 px-3 py-1 rounded-full uppercase tracking-widest">Quiz Mode</span>
                                        <button onClick={() => setIsQuizOpen(false)}><Icons.X size={20} className="text-slate-300" /></button>
                                    </div>
                                    <div className="mb-8">
                                        <h2 className="text-4xl font-bold text-slate-800 mb-2">{quizData.question.word}</h2>
                                        <p className="text-slate-400 text-sm italic">What does this mean?</p>
                                    </div>
                                    <div className="grid gap-3">
                                        {quizData.options.map(opt => (
                                            <button
                                                key={opt.id}
                                                onClick={() => handleAnswer(opt)}
                                                className={`w-full p-4 rounded-2xl border-2 font-bold text-left flex justify-between items-center transition-all
                                                    ${!quizData.selectedId ? 'border-slate-100 hover:border-indigo-300 active:bg-indigo-50' : 
                                                    opt.id === quizData.question.id ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 
                                                    opt.id === quizData.selectedId ? 'border-red-400 bg-red-50 text-red-600' : 'border-slate-50 opacity-50'}
                                                `}
                                            >
                                                <span>{opt.meaning}</span>
                                                {quizData.selectedId && opt.id === quizData.question.id && <div className="text-emerald-500"><Icons.CheckCircle2 size={20} /></div>}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="mt-8 pt-6 border-t border-slate-50 flex justify-between items-center text-slate-400">
                                        <span className="text-xs font-bold uppercase tracking-tighter">Current Score</span>
                                        <span className="text-indigo-600 font-bold">{quizData.score}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增彈窗 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-t-[2.5rem] sm:rounded-[2.5rem] shadow-2xl p-8">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-bold">加入新單字</h2>
                                    <button onClick={() => setIsModalOpen(false)}><Icons.X size={20} className="text-slate-300" /></button>
                                </div>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <input 
                                        type="text" placeholder="英文單字" autoFocus required
                                        className="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 text-lg font-bold"
                                        value={formData.word} onChange={e => setFormData({...formData, word: e.target.value})}
                                    />
                                    <input 
                                        type="text" placeholder="中文意思" required
                                        className="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 font-medium"
                                        value={formData.meaning} onChange={e => setFormData({...formData, meaning: e.target.value})}
                                    />
                                    <textarea 
                                        placeholder="補充例句或筆記..."
                                        className="w-full p-4 bg-slate-100 border-none rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500/20 h-24 resize-none text-sm"
                                        value={formData.note} onChange={e => setFormData({...formData, note: e.target.value})}
                                    />
                                    <button type="submit" className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-all">儲存並同步</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
